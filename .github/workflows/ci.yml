name: GenyConnect CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: macos-arm64
            os: macos-14
            qt_version: "6.11.0"
            qt_arch: clang_64
            target_arch: arm64
            macos_deployment_target: "14.0"

          # macOS Intel
          - name: macos-x86_64
            os: macos-15-intel
            qt_version: "6.11.0"
            qt_arch: clang_64
            target_arch: x86_64
            macos_deployment_target: "14.0"

          # Windows Intel/AMD 64-bit
          - name: windows-x64
            os: windows-latest
            qt_version: "6.10.3"
            qt_arch: win64_msvc2022_64
            cmake_arch: x64
            target_arch: x86_64

          # Windows ARM64
          - name: windows-arm64
            os: windows-11-arm
            qt_version: "6.10.3"
            qt_arch: win64_msvc2022_arm64
            cmake_arch: ARM64
            target_arch: arm64

    env:
      CMAKE_VERSION: "4.2.3"
      APP_VERSION: "1.3.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install ninja llvm

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ninja nsis 7zip

      - name: Configure LLVM on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          LLVM_PREFIX="$(brew --prefix llvm)"

          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "CLANG_SCAN_DEPS=${LLVM_PREFIX}/bin/clang-scan-deps" >> "$GITHUB_ENV"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"

          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"

      - name: Print macOS tool versions
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          echo "QT_ROOT_DIR=${QT_ROOT_DIR}"
          echo "CC=${CC}"
          echo "CXX=${CXX}"
          echo "CLANG_SCAN_DEPS=${CLANG_SCAN_DEPS}"
          echo "SDKROOT=${SDKROOT}"

          "${CXX}" --version
          "${CLANG_SCAN_DEPS}" --version
          cmake --version
          ninja --version
          xcrun --sdk macosx --show-sdk-version

      - name: Configure MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.cmake_arch }}

      - name: Configure macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
            -DCMAKE_CXX_COMPILER_CLANG_SCAN_DEPS="${CLANG_SCAN_DEPS}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ matrix.macos_deployment_target }}" \
            -DGENYCONNECT_MACOS_DEPLOYMENT_TARGET="${{ matrix.macos_deployment_target }}" \
            -DGENYCONNECT_USE_MODULES=ON \
            -DGENYCONNECT_LLVM_AUTO_SCAN=ON \
            -DGENYCONNECT_TARGET_ARCH="${{ matrix.target_arch }}" \
            -DGENYCONNECT_TARGET_BUILD_ARCH="${{ matrix.target_arch }}" \
            -DGENYCONNECT_MACOS_CODESIGN=ON \
            -DGENYCONNECT_CODESIGN_IDENTITY="-"

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A "${{ matrix.cmake_arch }}" `
            -DCMAKE_CONFIGURATION_TYPES="Release" `
            -DCMAKE_PREFIX_PATH="${env:QT_ROOT_DIR}" `
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON `
            -DGENYCONNECT_USE_MODULES=ON `
            -DGENYCONNECT_TARGET_ARCH="${{ matrix.target_arch }}" `
            -DGENYCONNECT_TARGET_BUILD_ARCH="${{ matrix.target_arch }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify macOS deployment target
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          APP="build/bin/GenyConnect.app"

          for f in \
            "$APP/Contents/MacOS/GenyConnect" \
            "$APP/Contents/MacOS/GenyConnectUpdater" \
            "$APP/Contents/MacOS/GenyConnectTunHelper"
          do
            echo
            echo "==== $f ===="
            otool -l "$f" | grep -A5 LC_BUILD_VERSION || true

            if otool -l "$f" | grep -A5 LC_BUILD_VERSION | grep -q "minos 26."; then
              echo "ERROR: $f was built with macOS 26.x minimum target."
              exit 1
            fi
          done

      - name: Re-sign macOS app ad-hoc and create DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          APP="build/bin/GenyConnect.app"
          OUT_DIR="build/final/macos-${{ matrix.target_arch }}"
          DMG_NAME="GenyConnect-${APP_VERSION}-macos-${{ matrix.target_arch }}.dmg"
          DMG_PATH="${OUT_DIR}/${DMG_NAME}"

          if [[ ! -d "$APP" ]]; then
            echo "App not found: $APP"
            exit 1
          fi

          mkdir -p "$OUT_DIR"

          echo "Cleaning previous DMG..."
          rm -f "$DMG_PATH"

          echo "Cleaning extended attributes..."
          xattr -cr "$APP" || true

          echo "Fixing executable permissions..."
          chmod +x "$APP/Contents/MacOS/GenyConnect" || true
          chmod +x "$APP/Contents/MacOS/GenyConnectUpdater" || true
          chmod +x "$APP/Contents/MacOS/GenyConnectTunHelper" || true
          chmod +x "$APP/Contents/MacOS/xray-core" || true

          echo "Removing old signatures from app bundle where possible..."
          codesign --remove-signature "$APP" || true

          echo "Ad-hoc signing nested Mach-O files..."

          while IFS= read -r file_path; do
            if file "$file_path" | grep -q "Mach-O"; then
              echo "Signing Mach-O: $file_path"
              codesign --force --sign - "$file_path" || true
            fi
          done < <(find "$APP/Contents" -type f)

          echo "Ad-hoc signing frameworks..."
          while IFS= read -r framework_path; do
            echo "Signing framework: $framework_path"
            codesign --force --sign - "$framework_path" || true
          done < <(find "$APP/Contents" -type d -name "*.framework" | sort -r)

          echo "Ad-hoc signing bundles/plugins..."
          while IFS= read -r bundle_path; do
            echo "Signing bundle/plugin: $bundle_path"
            codesign --force --sign - "$bundle_path" || true
          done < <(find "$APP/Contents" $begin:math:text$ \-name \"\*\.bundle\" \-o \-name \"\*\.plugin\" \-o \-name \"\*\.appex\" $end:math:text$ -type d | sort -r)

          echo "Signing main app..."
          codesign --force --deep --sign - "$APP"

          echo "Verifying app signature..."
          codesign --verify --deep --strict --verbose=4 "$APP"

          echo "Gatekeeper check. Expected to fail without Developer ID/notarization:"
          spctl --assess --type execute --verbose=4 "$APP" || true

          echo "Creating clean DMG..."
          STAGING="$(mktemp -d)"

          cp -R "$APP" "$STAGING/GenyConnect.app"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "GenyConnect" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          rm -rf "$STAGING"

          echo "Verifying DMG..."
          hdiutil verify "$DMG_PATH"

          echo "Created DMG:"
          ls -lh "$DMG_PATH"

      - name: Verify macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          DMG="$(find build/final -type f -name "*.dmg" | head -n 1)"

          if [[ -z "$DMG" ]]; then
            echo "No DMG found."
            exit 1
          fi

          echo "Verifying DMG: $DMG"
          hdiutil verify "$DMG"

          MOUNT_DIR="$(mktemp -d)"
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -quiet

          APP="$(find "$MOUNT_DIR" -maxdepth 2 -name "GenyConnect.app" -type d | head -n 1)"

          if [[ -z "$APP" ]]; then
            echo "GenyConnect.app not found inside DMG."
            hdiutil detach "$MOUNT_DIR" -quiet || true
            exit 1
          fi

          echo "Verifying app inside DMG: $APP"
          codesign --verify --deep --strict --verbose=4 "$APP"

          echo "Gatekeeper check. Expected to fail without Developer ID/notarization:"
          spctl --assess --type execute --verbose=4 "$APP" || true

          hdiutil detach "$MOUNT_DIR" -quiet

      - name: Package
        if: runner.os != 'macOS'
        run: cpack --config build/CPackConfig.cmake -C Release

      - name: Collect packages
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts

          find build/final -type f -name "*.dmg" -exec cp {} artifacts/ \;
          find build/final -type f -name "*.zip" -exec cp {} artifacts/ \;
          find build/final -type f -name "*.exe" -exec cp {} artifacts/ \;
          find build/final -type f -name "*.tar.gz" -exec cp {} artifacts/ \;
          find build/final -type f -name "*.tgz" -exec cp {} artifacts/ \;

          if [ -z "$(find artifacts -type f -print -quit)" ]; then
            echo "No packages found. Listing recent build files:"
            find build -maxdepth 5 -type f | sort | tail -200
            exit 1
          fi

          ls -lah artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenyConnect-${{ matrix.name }}
          path: artifacts/*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true